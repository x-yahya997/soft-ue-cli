<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 340" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="grad-mcp" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad-cli" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0284c7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad-mid" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad-ue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="720" height="340" rx="12" fill="#f8fafc"/>

  <!-- Top row: MCP client -->
  <rect x="40" y="30" width="280" height="56" rx="10" fill="url(#grad-mcp)" filter="url(#shadow)"/>
  <text x="180" y="55" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">MCP Client</text>
  <text x="180" y="73" text-anchor="middle" fill="#c7d2fe" font-size="10.5">Claude Desktop, Cursor, Windsurf, ...</text>

  <!-- Top row: Claude Code / terminal -->
  <rect x="400" y="30" width="280" height="56" rx="10" fill="url(#grad-cli)" filter="url(#shadow)"/>
  <text x="540" y="55" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">Claude Code / Terminal / CI</text>
  <text x="540" y="73" text-anchor="middle" fill="#bae6fd" font-size="10.5">shell, scripts, pipelines</text>

  <!-- Arrows: top to middle -->
  <line x1="180" y1="86" x2="180" y2="148" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="540" y1="86" x2="540" y2="148" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Arrow labels -->
  <rect x="112" y="104" width="136" height="22" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="180" y="119" text-anchor="middle" fill="#64748b" font-size="10" font-weight="500">stdio (MCP protocol)</text>

  <rect x="480" y="104" width="120" height="22" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="540" y="119" text-anchor="middle" fill="#64748b" font-size="10" font-weight="500">shell commands</text>

  <!-- Middle row: soft-ue-cli mcp-serve -->
  <rect x="40" y="150" width="280" height="50" rx="10" fill="url(#grad-mid)" stroke="#cbd5e1" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="180" y="180" text-anchor="middle" fill="#334155" font-size="13.5" font-weight="600" font-family="'Cascadia Code', 'Fira Code', monospace">soft-ue-cli mcp-serve</text>

  <!-- Middle row: soft-ue-cli <command> -->
  <rect x="400" y="150" width="280" height="50" rx="10" fill="url(#grad-mid)" stroke="#cbd5e1" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="540" y="180" text-anchor="middle" fill="#334155" font-size="13.5" font-weight="600" font-family="'Cascadia Code', 'Fira Code', monospace">soft-ue-cli &lt;command&gt;</text>

  <!-- Converging arrows to bottom -->
  <line x1="180" y1="200" x2="310" y2="262" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="540" y1="200" x2="410" y2="262" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Converging arrow label -->
  <rect x="280" y="224" width="160" height="22" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="360" y="239" text-anchor="middle" fill="#64748b" font-size="10" font-weight="500">HTTP / JSON-RPC</text>

  <!-- Bottom: SoftUEBridge -->
  <rect x="180" y="260" width="360" height="56" rx="10" fill="url(#grad-ue)" filter="url(#shadow)"/>
  <text x="360" y="285" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">SoftUEBridge Plugin</text>
  <text x="360" y="303" text-anchor="middle" fill="#94a3b8" font-size="10.5">inside Unreal Engine</text>

  <!-- Arrowhead marker -->
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#94a3b8"/>
    </marker>
  </defs>
</svg>
